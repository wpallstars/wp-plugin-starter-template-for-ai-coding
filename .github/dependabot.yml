# Dependabot configuration for wp-plugin-starter-template-for-ai-coding.
# Reference: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Strategy:
#   * Group minor/patch bumps into one PR per ecosystem to keep review cost low.
#   * Keep majors as separate PRs so breaking changes get individual scrutiny.
#   * Run weekly (Mondays) — security updates are unaffected by this schedule;
#     they always open immediately when an advisory drops.
#
# Repo-level "Dependabot security updates" must also be enabled in
# Settings → Code security → Dependabot. Without it, alerts are visible but
# Dependabot will not open fix PRs automatically.
version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Etc/UTC"
      open-pull-requests-limit: 10
      labels:
          - "dependencies"
          - "javascript"
      commit-message:
          prefix: "chore(deps)"
          prefix-development: "chore(deps-dev)"
          include: "scope"
      groups:
          npm-minor-patch:
              applies-to: version-updates
              update-types:
                  - "minor"
                  - "patch"
          npm-security:
              applies-to: security-updates
              patterns:
                  - "*"

    - package-ecosystem: "composer"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Etc/UTC"
      open-pull-requests-limit: 10
      labels:
          - "dependencies"
          - "php"
      commit-message:
          prefix: "chore(deps)"
          prefix-development: "chore(deps-dev)"
          include: "scope"
      groups:
          composer-minor-patch:
              applies-to: version-updates
              update-types:
                  - "minor"
                  - "patch"
          composer-security:
              applies-to: security-updates
              patterns:
                  - "*"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Etc/UTC"
      open-pull-requests-limit: 5
      labels:
          - "dependencies"
          - "github-actions"
      commit-message:
          prefix: "chore(actions)"
          include: "scope"
      groups:
          actions-minor-patch:
              applies-to: version-updates
              update-types:
                  - "minor"
                  - "patch"
          actions-security:
              applies-to: security-updates
              patterns:
                  - "*"
