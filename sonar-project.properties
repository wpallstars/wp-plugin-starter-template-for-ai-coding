# Required metadata
sonar.projectKey=wpallstars_wp-plugin-starter-template-for-ai-coding
sonar.organization=wpallstars
sonar.projectName=wp-plugin-starter-template-for-ai-coding
sonar.projectVersion=0.1.15

# Path to source directories
sonar.sources=.

# Path to test directories (comment if no test)
sonar.tests=tests

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions for copy-paste detection
sonar.cpd.exclusions=tests/**

# Exclude directories and files
sonar.exclusions=vendor/**,node_modules/**,tests/**,bin/**,build/**,dist/**,.github/**,.git/**,cypress/**,playground/**,.wiki/**,mu-plugins/**

# PHP specific configuration
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=test-report.xml

# Rule exclusions
# php:S100 - WordPress uses snake_case naming convention for functions and methods.
# This is intentional and required for WordPress hook compatibility.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.php

# Additional parameters
sonar.verbose=true
